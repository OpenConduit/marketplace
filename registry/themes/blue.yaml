id: blue-theme
name: Blue
type: theme
author: openconduit
verified: true
version: "1.0.0"
description: Blue Theme
content:
  colors:
    --color-primary:    "#003F6E"   # Vistra Blue → buttons, focus rings, active states
    --color-surface:    "#161B21"   # Rich Black → main panels, chat area
    --color-background: "#0d1117"   # deeper than Rich Black → window bg
    --color-muted:      "#1e2530"   # Rich Black lightened → cards, inputs
    --color-border:     "#555559"   # Cool Gray → dividers
    --color-text:       "#BFE7F7"   # Pale Cornflower → body text